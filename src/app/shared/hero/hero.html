<section class="hero">
    <div class="container">
        <div class="row align-items-center">
            <!-- LEFT -->
            <div class="col-lg-6">
                <h1>
                    Protect Your Car
                    <br>
                    <span>Drive With Shine</span>
                </h1>
                <p>
                    High quality car care products designed
                    to clean, protect and maintain your
                    vehicle with professional results.
                </p>

                <div class="hero-actions">

                    <button class="shop-btn" routerLink="/products">
                        Shop Now
                    </button>
                    <button class="learn-btn" routerLink="/about">
                        Learn More
                    </button>
                </div>
            </div>
            <!-- RIGHT -->

            <div class="col-lg-6">
                <div class="hero-image">
                    <img [src]="getImageUrl('assets/images/car-care-hero.png')" alt="car care">
                </div>
            </div>
        </div>
    </div>
</section>
